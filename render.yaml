services:
  - type: web
    name: dvt-api-gateway
    env: node
    plan: free
    rootDir: services/api-gateway
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: VERIFICATION_SERVICE_URL
        fromService:
          type: web
          name: dvt-voter-auth-service
          envVarKey: RENDER_EXTERNAL_URL
      - key: VOTING_SERVICE_URL
        fromService:
          type: web
          name: dvt-election-data-service
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: dvt-voter-auth-service
    env: node
    plan: free
    rootDir: services/voter-auth-service
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/puppeteer
      - key: ELECTION_SERVICE_URL
        fromService:
          type: web
          name: dvt-election-data-service
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: dvt-election-data-service
    env: node
    plan: free
    rootDir: services/election-data-service
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: dvt-voter-auth-service
          envVarKey: RENDER_EXTERNAL_URL
